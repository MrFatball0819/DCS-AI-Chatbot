[DISCORD]
; 🔑 機器人正牌 Token（本地保存，絕不上傳）
BOT_TOKEN = 

[GATEWAY]
WHISPER_CLI_PATH = ../whisper.cpp/build/bin/whisper-cli
WHISPER_MODEL_PATH = ../whisper.cpp/models/ggml-small.en.bin
THREADS = 8

[LLM_SWITCH]
; 🔑 true = 走本地 Ollama 軌道，false = 走雲端 REST API 軌道
USE_LOCAL_OLLAMA = true

[OLLAMA_CONFIG]
VICTUS_IP = 192.168.200.191
PORT = 11434
MODEL_NAME = phi3.5:latest

[CLOUD_API_CONFIG]
API_URL = https://openrouter.ai/api/v1/chat/completions
MODEL_NAME = google/gemini-2.5-flash:free
API_KEY = YOUR_NEW_SAFE_KEY

[LLM_NUANCES]
; 🚀 究極精簡鋼印：徹底砸碎任何多餘的約束贅肉，只給它一發最直白的角色定義，放開大腦的所有注意力！
SYSTEM_PROMPT = "You are a DCS military fighter jet co-pilot. Respond in a short, crisp cockpit radio style sentence."
