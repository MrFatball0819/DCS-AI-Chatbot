[HARDWARE]
# 【真．硬體名稱防洗牌鎖】
target_device_name = winwing orion throttle
target_btn_id = 8

# ==================== 本地 STT 升級與聯網維護開關 ====================
# 預設為 False：100% 物理斷網離線模式，0 毫秒秒開，絕不連接 Hugging Face 檢查更新
# 若改為 True：啟動時將暫時允許連網，自動從 Hugging Face 下載或修復下方指定的模型快取
stt_force_update = true

# 允許玩家自由升級模型尺寸 (可選: tiny.en, base.en, small.en, medium.en)
# 預設 small.en 配合 mapping.txt 是最完美的算力與準確度平衡點
stt_model_size = small.en


[NETWORK]
# 模式切換：local (走區網去客廳筆電 / Proxmox 伺服器) 或 cloud (走雲端 Token API)
llm_mode = local

# 客廳 HP Victus 筆電的 Ollama 戰術私網高鐵 API 網址 (本地軌道使用)
ollama_url = http://fatballvictus:11434/api/generate
local_model = dcs-copilot

# 雲端通用 Token API 設定 (雲端軌道備用，相容 OpenAI / OpenRouter / DeepSeek 格式)
cloud_api_url = https://deepseek.com
cloud_api_key = sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
cloud_model = deepseek-chat


[PATHS]
# 64 位元 Windows 實體 VoiceAttack 安裝路徑
va_path = C:\Program Files\VoiceAttack\VoiceAttack.exe


[ROUTING]
# 【真．戰術字首動態配置晶片】
# 只要 Pilot 發話中包含了這裡面的任何一個通訊對象（用逗號隔開），Python 會 100% 在第一關攔截送給 VoiceAttack！
# 未來如果有全新的僚機、預警機、或特殊的戰術台呼（如 Colt, Texaco），直接在後面加逗號補上即可，0 程式碼污染！
radio_prefixes = atc, act, dct, wingman, wing man, flight, element, tanker, texaco, arco, carrier, marshal, lso, chief, ground crew


[TELEMETRY]
# ----------------------------------------------------
# 未來完全體升級：Export.lua 軍規級動態時段去抖動自適應更新算法 (DCS 內部數據輪詢)
# AI 副駕駛不碰座艙開關，只進行宏觀戰術大局感知 (Situational Awareness)
# ----------------------------------------------------
export_port = 5040
interval_cold_zone = 30.0
interval_hot_zone = 1.0
